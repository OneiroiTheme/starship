[username]
format = '[ $user ]($style)'
style_user = "bg:1st fg:black"
style_root = "bg:1st fg:black"
show_always = true

[hostname]
format = '[@$hostname$ssh_symbol ]($style)'
style = "bg:1st fg:black"
ssh_only = false
ssh_symbol = "¯«®"

[directory]
format = '[ $path ]($style)[$read_only]($read_only_style)'
style = "bg:3rd fg:black"
truncation_length = 3
truncation_symbol = 'ÔÇĞ/'
read_only = '¯®Á'
read_only_style = "bg:3rd fg:err"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
format = '[ $symbol$branch(:$remote_branch)]($style)'
style = "bg:2nd fg:black"
symbol = '´Éİ'
truncation_length = 6
truncation_symbol = 'ÔÇĞ'

[git_status]
style = "bg:2nd fg:black"
format = '[$all_status$ahead_behind ]($style)'

[conda]
format = '[ $symbol$environment ]($style)'
symbol = '´äî'
style = "bg:suc fg:black"
truncation_length = 1

[python]
format = '[ $symbol$version$pyenv_prefix(\($virtualenv\)) ]($style)'
symbol = '¯£╝'
style = "bg:suc fg:black"
pyenv_prefix = '(pyenv)'
version_format = '${raw}'

[time]
disabled = false
time_format = "%R"
style = "bg:inf fg:black"
format = '[ ´É║ $time ]($style)'

[character]
success_symbol = "[ÔØ»](inf)"
error_symbol = "[ÔØ»](err bold)"
vimcmd_symbol = "[ÔØ«](inf)"

[cmd_duration]
format = '[$duration]($style)'
style = 'com'
min_time = 2_000
show_milliseconds = true
